name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  PREK_VERSION: v0.3.4

jobs:
  lint:
    name: Prek Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install prek
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            "https://github.com/j178/prek/releases/download/${PREK_VERSION}/prek-installer.sh" | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run prek hooks
        run: prek run --all-files

      - name: Verify no files changed
        run: git diff --exit-code

  test:
    name: Go Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

  build:
    name: Build Binaries (${{ matrix.goos }}, ${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            bin_name: rbv-linux-amd64
          - goos: windows
            goarch: amd64
            bin_name: rbv-windows-amd64.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          mkdir -p dist
          go build -trimpath -ldflags "-s -w" -o "dist/${{ matrix.bin_name }}" ./cmd/rbv

  gate:
    name: CI Passed
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
      - build
    if: ${{ always() }}
    steps:
      - name: Verify dependencies passed
        run: |
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "Lint failed: ${{ needs.lint.result }}"
            exit 1
          fi
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "Build matrix failed: ${{ needs.build.result }}"
            exit 1
          fi
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "Go tests failed: ${{ needs.test.result }}"
            exit 1
          fi
          echo "All CI checks passed."
